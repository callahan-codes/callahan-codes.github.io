<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Event Listeners</title>
</head>
<body>

    <main>

        <!-- alerts -->
        <div class="alert" id="alert">
            <div class="alert-msg" id="alert-msg"></div>
            <div class="exit" id="exit">X</div>
        </div>

        <!-- mouse events -->
        <h1>Mouse Events</h1>
        <div class="item" id="click">
            <h2>Click</h2>
        </div>

        <div class="item" id="over">
            <h2>Mouse Over (hover)</h2>
        </div>

        <!-- keyboard events -->
        <h1>Keybodard Events</h1>
        <h2>Any Key Pressed</h2>
        <div class="item" id="anykey">
            <input placeholder="type here">
        </div>


    </main>
    
</body>

<script src="script.js"></script>
</html>
