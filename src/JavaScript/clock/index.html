<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Clocks</title>
</head>
<body>

    <main>

        <div class="grid">

            <div class="grid-item">
                <h1>Clock</h1>
                <div id="clock"></div>
            </div>

            <div class="grid-item">
                <h1>Countdown</h1>
                <div id="countdown"></div>
                <p>Time until January 1st, 2025</p>
            </div>

            <div class="grid-item">
                <h1>Timer</h1>
                <div id="timer">
                    <p><span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>:<span id="tens">00</span></p>
                </div>
                <div id="buttons">
                    <div id="btn1">Start</div>
                    <div id="btn2">Stop</div>
                    <div id="btn3">Reset</div>
                </div>
            </div>

        </div>

    </main>
    
</body>

<script src="clock.js"></script>
</html>
